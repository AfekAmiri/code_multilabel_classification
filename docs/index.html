<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Illuin Technology Challenge</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Documentation Illuin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.css" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
      .app-name img { max-width: 120px; max-height: 120px; }
      .sidebar .sidebar-nav { line-height: 1.5em; }
      .app-sub-sidebar li:before { content: '•'; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      var num = 0;
      mermaid.initialize({ startOnLoad: false });
      window.$docsify = {
        name: 'Illuin Technology Challenge',
        repo: 'afekamiri/tech_challenge_illuin_technology',
        loadSidebar: true,
        subMaxLevel: 3,
        markdown: {
          renderer: {
            code: function (code, lang) {
              if (lang === 'mermaid') {
                return (
                  '<div class="mermaid">' +
                  mermaid.render('mermaid-svg-' + num++, code) +
                  '</div>'
                );
              }
              return this.origin.code.apply(this, arguments);
            },
            image: function (href, title) {
              // Corrige le chemin pour les images
              return `<img src="${href}" data-origin="${href}" alt="${title}">`;
            },
          },
        },
        'flexible-alerts': {
          style: 'callout',
          note: {},
          tip: {},
          warning: {},
          attention: { label: 'Caution' },
          caution: {
            label: 'Caution',
            className: 'attention',
            icon: 'fas fa-circle-exclamation',
          },
          important: {
            label: 'Important',
            className: 'important',
            icon: 'fas fa-exclamation',
          },
        },
        toc: {
          tocMaxLevel: 5,
          target: 'h2, h3, h4, h5, h6',
          ignoreHeaders: [
            '<!-- {docsify-ignore} -->',
            '<!-- {docsify-ignore-all} -->',
          ],
        },
        darklightTheme: {
          siteFont: 'Inter',
          defaultTheme: 'light',
          bodyFontSize: '16px',
          codeFontFamily: 'var(--fontStack-monospace, ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace)',
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  </body>
</html>
